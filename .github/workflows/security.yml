name: Security

on:
  push:
    branches: [main, v*]
  pull_request:
    branches: [main, v*]
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[ruff] safety
          pip install -e .[dev]

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -f txt -o bandit-report.txt || true

      - name: Check for dependency vulnerabilities
        run: |
          safety check --json || true
          safety check || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            bandit-report.txt

      - name: Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const bandit = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));

            if (bandit.results && bandit.results.length > 0) {
              const issues = bandit.results.map(r => `- ${r.issue_text} (${r.severity}): ${r.filename}:${r.line_number}`).join('\n');
              core.warning(`Security issues found:\n${issues}`);
            } else {
              core.notice('No security issues found by Bandit scan');
            }

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-security-checks:
    name: Code Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff security checks
        run: |
          # Check for security issues (S rules)
          ruff check src/ --select S --output-format=json > ruff-security.json || true
          ruff check src/ --select S --output-format=compact || true

      - name: Upload Ruff security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-security-report
          path: ruff-security.json
