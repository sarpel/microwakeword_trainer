hardware:
  sample_rate_hz: 16000
  mel_bins: 40
  window_size_ms: 30
  window_step_ms: 10
  clip_duration_ms: 1000
paths:
  positive_dir: "./dataset/positive"
  negative_dir: "./dataset/negative"
  hard_negative_dir: "./dataset/hard_negative"
  background_dir: "./dataset/background"
  rir_dir: "./dataset/rirs"
  processed_dir: "./data/processed"
  checkpoint_dir: "./models/checkpoints"
  export_dir: "./models/exported"
training:
  training_steps: [40000, 25000, 10000]
  learning_rates: [0.001, 0.0001, 0.00005]
  batch_size: 64
  split_seed: 42
  eval_step_interval: 1000
  eval_basic_step_interval: 1000
  materialize_metrics_interval: 3000
  eval_advanced_step_interval: 5000
  eval_confusion_matrix_interval: 5000
  eval_checkpoints_interval: 5000
  eval_log_every_step: true
  steps_per_epoch: 1000
  positive_class_weight: [10.0, 20.0, 35.0]
  negative_class_weight: [1.0, 1.0, 1.0]
  hard_negative_class_weight: [5.0, 7.5, 10.0]
  time_mask_max_size: [2, 4, 6]
  time_mask_count: [1, 1, 1]
  freq_mask_max_size: [2, 4, 6]
  freq_mask_count: [1, 1, 1]
  minimization_metric: "ambient_false_positives_per_hour"
  target_minimization: 0.2
  maximization_metric: "average_viable_recall"
  ambient_duration_hours: 28.75
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  strict_content_hash_leakage_check: true
  optimizer: "adam"
  label_smoothing: 0.00
  gradient_clipnorm: 1.0
  ema_decay: null
  random_seed: 42              # Set an integer for reproducible runs (null = non-deterministic)
  auto_tune_on_poor_fah: true   # If true, run mww-autotune automatically after training if final FAH > target_minimization
model:
  architecture: "mixednet"
  first_conv_filters: 32
  first_conv_kernel_size: 5
  stride: 3
  pointwise_filters: "64,64,64,64"
  mixconv_kernel_sizes: "[5],[7,11],[9,15],[23]"
  repeat_in_block: "1,1,1,1"
  residual_connection: "0,0,1,1"
  dropout_rate: 0.15
  l2_regularization: 0.0001
augmentation:
  SevenBandParametricEQ: 0.20
  TanhDistortion: 0.15
  PitchShift: 0.15
  BandStopFilter: 0.10
  AddColorNoise: 0.20
  AddBackgroundNoiseFromFile: 0.35
  Gain: 1.0
  ApplyImpulseResponse: 0.30
  background_min_snr_db: -5.0
  background_max_snr_db: 15.0
  min_jitter_s: 0.15
  max_jitter_s: 0.20
  eq_min_gain_db: -6.0
  eq_max_gain_db: 6.0
  distortion_min: 0.05
  distortion_max: 0.2
  pitch_shift_min_semitones: -2.0
  pitch_shift_max_semitones: 2.0
  band_stop_min_center_freq: 125.0
  band_stop_max_center_freq: 7500.0
  band_stop_min_bandwidth_fraction: 0.5
  band_stop_max_bandwidth_fraction: 1.99
  gain_min_db: -5.0
  gain_max_db: 5.0
  color_noise_min_snr_db: -10.0
  color_noise_max_snr_db: 20.0
  impulse_paths: ["./dataset/rirs"]
  background_paths: ["./dataset/background"]
#  augmentation_duration_s: 3.2
performance:
  gpu_only: true
  mixed_precision: true
  spec_augment_backend: "tf"
  async_mining: true
  num_workers: 4
  num_threads_per_worker: 2
  prefetch_factor: 8
  pin_memory: true
  max_memory_gb: 40
  inter_op_parallelism: 16
  intra_op_parallelism: 16
  enable_profiling: false
  profile_every_n_steps: 1000
  profile_output_dir: "./profiles"
  tf_profile_start_step: 0   # Step to start TF Profiler GPU trace (0 = disabled)
  gpu_memory_log_interval: 1000  # Log GPU memory to TensorBoard every N steps (0 = disabled)
  tensorboard_enabled: true
  tensorboard_log_dir: "./logs"
  tensorboard_log_histograms: true
  tensorboard_log_images: true
  tensorboard_log_pr_curves: true
  tensorboard_log_graph: true
  tensorboard_log_advanced_scalars: true
  tensorboard_log_weight_histograms: true
  tensorboard_image_interval: 5000
  tensorboard_histogram_interval: 5000
  prefetch_buffer: 4
  use_tfdata: true
  tfdata_cache_dir: null  # Use RAM cache (64GB available) instead of disk
  mmap_readonly: true
  tfdata_prefetch_to_device: true
  tfdata_prefetch_device: "/GPU:0"
  benchmark_pipeline: false
  log_throughput: false
  log_throughput_interval: 100
  disable_mmap: false
speaker_clustering:
  enabled: true
  method: "adaptive"
  embedding_model: "speechbrain/spkrec-ecapa-voxceleb"
  similarity_threshold: 0.68
  n_clusters: null
  leakage_audit_enabled: true
  leakage_similarity_threshold: 0.9
  use_embedding_cache: true
  cache_dir: ./cache/speaker_embeddings
  batch_size: 32
  num_io_workers: 8
  use_mixed_precision: true
  use_dataloader: true
  use_adaptive_clustering: true
  hdbscan_min_cluster_size: 5
  hdbscan_min_samples: 3
  adaptive_threshold_small: 5000
  adaptive_threshold_large: 50000
hard_negative_mining:
  enabled: true
  fp_threshold: 0.75
  max_samples: 15000
  mining_interval_epochs: 1
  # NEW - Collection Phase (during training)
  collection_mode: "log_only"           # "log_only" | "mine_immediately"
  log_predictions: true
  log_file: "logs/false_predictions.json"
  # NEW - Mining Phase (post-training)
  enable_post_training_mining: true
  mined_subdirectory: "mined"
  min_epochs_before_mining: 10
  top_k_per_epoch: 100
  deduplicate_by_hash: true
export:
  wake_word: "Hey Katya"
  author: "Sarpel GURAY"
  website: "https://github.com/sarpel/microwakeword-trainer"
  trained_languages: ["en"]
  quantize: true
  inference_input_type: "int8"
  inference_output_type: "uint8"
  probability_cutoff: 0.97
  sliding_window_size: 5
  tensor_arena_size: 30000
  minimum_esphome_version: "2024.7.0"
  representative_dataset_size: 500
  representative_dataset_real_size: 2000
  arena_size_margin: 1.3
preprocessing:
  min_duration_ms: 300.0
  max_duration_ms: 2000.0
  discarded_dir: "./discarded"
  vad_aggressiveness: 2
  vad_pad_ms: 200
  vad_frame_ms: 30
  split_max_chunk_ms: 2000.0
  split_min_chunk_ms: 500.0
  split_target_chunk_ms: 2000.0
quality:
  clip_threshold: 0.001
  max_clip_ratio: 0.005
  discard_bottom_pct: 3.0
  min_wqi: 0.3
  discarded_quality_dir: "./discarded/quality"
  min_snr_db: 0.0
  vad_speech_threshold: 0.4
  dnsmos_min_ovrl: 2.0
  dnsmos_min_sig: 2.5
  dnsmos_cache_dir: "~/.cache/dnsmos"
evaluation:
  default_threshold: 0.97
  n_thresholds: 101
  max_fah: 1.0
  warmup_runs: 10
  n_latency_runs: 100
  target_fah: 0.2
  target_recall: 0.90
  gain_window_steps: 1000
  plateau_window_evals: 5
  plateau_min_delta: 0.001
  plateau_slope_eps: 0.0001
