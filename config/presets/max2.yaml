# ─────────────────────────────────────────────────────────────────
# MAX QUALITY PRESET - Best possible model accuracy
# Use for: Final production training when quality matters most
# Hardware: RTX 3060 Ti 8GB, 64GB RAM, Ryzen 9 7950X
# ─────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────
# HARDWARE PARAMETERS (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────
hardware:
  sample_rate_hz: 16000
  mel_bins: 40
  window_size_ms: 30
  window_step_ms: 10
  clip_duration_ms: 1000

# ─────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────
paths:
  positive_dir: "${DATASET_DIR:-./dataset}/positive"
  negative_dir: "${DATASET_DIR:-./dataset}/negative"
  hard_negative_dir: "${DATASET_DIR:-./dataset}/hard_negative"
  background_dir: "${DATASET_DIR:-./dataset}/background"
  rir_dir: "${DATASET_DIR:-./dataset}/rirs"
  processed_dir: "${DATA_DIR:-./data}/processed"
  checkpoint_dir: "${CHECKPOINT_DIR:-./models/checkpoints}"
  export_dir: "${MODEL_EXPORT_DIR:-./models/exported}"

# ─────────────────────────────────────────────────────────────────
# TRAINING PARAMETERS
# ─────────────────────────────────────────────────────────────────
training:
  # 3-phase schedule: Phase 1 learns discrimination, Phase 2 refines boundary, Phase 3 polishes
  training_steps: [30000, 30000, 20000]
  # LR starts at standard 0.001, decays ~5x per phase for stable convergence
  learning_rates: [0.0017, 0.00035, 0.00009]  # Sqrt-scaled for batch_size 384 (×√3 from 128)
  batch_size: 384               # Increased from 128 — fills 8GB VRAM better (~3.5-4GB)
  split_seed: 42
  eval_step_interval: 500                 # Not directly used as a condition in the training loop.
  eval_basic_step_interval: 500           # Main eval trigger. Runs full validation, computes all metrics. Prints 📊 Validation Results table.
  materialize_metrics_interval: 1000      # Training accuracy computation. Requires full batch evaluation
  eval_advanced_step_interval: 2000       # Advanced computations: Score distribution, gain metrics, triggers hard negative mining updates.
  eval_confusion_matrix_interval: 5000    # Prints the confusion matrix table and per-class recall/miss-rate/rejection-rate breakdown.
  eval_checkpoints_interval: 1000         # Best model checkpoint saving. The `✅ BEST MODEL` message comes from here.
  eval_log_every_step: true
  steps_per_epoch: 1000

  positive_class_weight: [4.0, 5.0, 6.0]      # De-emphasized from [10,20,30] — was too recall-biased
  negative_class_weight: [3.0, 5.0, 8.0]     # Slightly up from [1,1,1] to maintain FAH pressure with more aggressive mining
  hard_negative_class_weight: [5.0, 8.0, 12.0]   # UP from [1,1,1] — force discrimination against confusables

  # Progressive SpecAugment: light→moderate→strong
  time_mask_max_size: [2, 4, 6]
  time_mask_count: [1, 2, 2]
  freq_mask_max_size: [2, 4, 6]
  freq_mask_count: [1, 2, 2]

  # Checkpoint selection
  minimization_metric: "ambient_false_positives_per_hour"  # CHANGED: Prioritize recall over FAH
  target_minimization: 2.0  # RAISED: Allow 2 FAH instead of 0.2 - model needs to learn to detect wake word
  maximization_metric: "average_viable_recall"

  # 42.02h of ambient audio (negative + background + hard_negative) for FAH calculation
  ambient_duration_hours: 42.02
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  strict_content_hash_leakage_check: true

  # Optimizer and loss parameters
  optimizer: "adam"
  label_smoothing: 0.02
  gradient_clipnorm: 1.0        # Was 0.5 = too aggressive, capped max score at 0.87
  ema_decay: 0.995               # Half-life ~700 steps, smooths noise without killing convergence
  random_seed: 42               # Reproducible runs
  auto_tune_on_poor_fah: true

# ─────────────────────────────────────────────────────────────────
# MIXEDNET ARCHITECTURE
# ─────────────────────────────────────────────────────────────────
model:
  architecture: "mixednet"
  first_conv_filters: 32
  first_conv_kernel_size: 5
  stride: 3
  pointwise_filters: "64,64,64,64"
  mixconv_kernel_sizes: "[5],[7,11],[9,15],[23]"
  repeat_in_block: "1,1,1,1"
  residual_connection: "0,1,1,1"  # Residual on blocks 2-4 for gradient flow

  # Moderate regularization (less than before to avoid score compression)
  dropout_rate: 0.12
  l2_regularization: 0.0001

# ─────────────────────────────────────────────────────────────────
# AUGMENTATION (aggressive for max generalization)
# ─────────────────────────────────────────────────────────────────
augmentation:
  SevenBandParametricEQ: 0.20
  TanhDistortion: 0.08
  PitchShift: 0.10
  BandStopFilter: 0.10
  AddColorNoise: 0.20
  AddBackgroundNoiseFromFile: 0.40
  Gain: 1.0
  ApplyImpulseResponse: 0.30

  # Noise mixing: wider SNR range for robustness
  background_min_snr_db: -8.0
  background_max_snr_db: 15.0
  min_jitter_s: 0.15
  max_jitter_s: 0.20

  # Augmentation magnitude ranges
  eq_min_gain_db: -6.0
  eq_max_gain_db: 6.0
  distortion_min: 0.05
  distortion_max: 0.2
  pitch_shift_min_semitones: -1.2
  pitch_shift_max_semitones: 1.2
  band_stop_min_center_freq: 125.0
  band_stop_max_center_freq: 7500.0
  band_stop_min_bandwidth_fraction: 0.5
  band_stop_max_bandwidth_fraction: 1.99
  gain_min_db: -5.0
  gain_max_db: 5.0
  color_noise_min_snr_db: -10.0
  color_noise_max_snr_db: 20.0

  # Background sources
  impulse_paths: ["${DATASET_DIR:-./dataset}/rirs"]
  background_paths: ["${DATASET_DIR:-./dataset}/background"]
  #augmentation_duration_s: 3.2

# ─────────────────────────────────────────────────────────────────
# PERFORMANCE CONFIGURATION (tuned for RTX 3060 Ti + Ryzen 9 7950X)
# ─────────────────────────────────────────────────────────────────
performance:
  gpu_only: true
  mixed_precision: true
  spec_augment_backend: "tf"
  num_workers: 8
  num_threads_per_worker: 2
  prefetch_factor: 12
  pin_memory: true
  max_memory_gb: 40
  inter_op_parallelism: 16
  intra_op_parallelism: 16

  # Profiling disabled for production training speed
  enable_profiling: false
  profile_every_n_steps: 1000
  profile_output_dir: "./profiles"
  tf_profile_start_step: 0
  gpu_memory_log_interval: 1000

  # Full TensorBoard logging for analysis
  tensorboard_enabled: true
  tensorboard_log_dir: "./logs"
  tensorboard_log_histograms: false
  tensorboard_log_images: false
  tensorboard_log_pr_curves: true
  tensorboard_log_graph: true
  tensorboard_log_advanced_scalars: true
  tensorboard_log_weight_histograms: false
  tensorboard_image_interval: 5000
  tensorboard_histogram_interval: 5000

  # Sophisticated metrics (Phase 4) - disabled by default for cleaner logs
  tensorboard_log_learning_rate: true
  tensorboard_log_gradient_norms: false
  tensorboard_log_activation_stats: false
  tensorboard_log_confidence_drift: true
  tensorboard_log_per_class_accuracy: true
  tensorboard_sophisticated_interval: 2000

  # Data pipeline
  mmap_readonly: true
  tfdata_prefetch_to_device: true
  tfdata_prefetch_device: "/GPU:0"
  benchmark_pipeline: false
  log_throughput: false
  log_throughput_interval: 1000
  disable_mmap: false

# ─────────────────────────────────────────────────────────────────
# SPEAKER CLUSTERING (strict for max quality)
# ─────────────────────────────────────────────────────────────────
speaker_clustering:
  enabled: true
  method: "adaptive"
  embedding_model: "speechbrain/spkrec-ecapa-voxceleb"
  similarity_threshold: 0.68
  n_clusters: null
  leakage_audit_enabled: true
  leakage_similarity_threshold: 0.9
  use_embedding_cache: true
  cache_dir: ./cache/speaker_embeddings
  batch_size: 32
  num_io_workers: 8
  use_mixed_precision: true
  use_dataloader: true
  use_adaptive_clustering: true
  hdbscan_min_cluster_size: 5
  hdbscan_min_samples: 3
  adaptive_threshold_small: 5000
  adaptive_threshold_large: 50000

# ─────────────────────────────────────────────────────────────────
# HARD NEGATIVE MINING (enabled for max quality)
# ─────────────────────────────────────────────────────────────────
# MINING (Max quality — mine every epoch, stricter thresholds)
# ─────────────────────────────────────────────────────────────────
mining:
  enabled: true
  fp_threshold: 0.5
  max_samples: 8000
  mining_interval_epochs: 1              # Mine EVERY epoch for max quality
  collection_mode: "log_only"
  log_predictions: true
  log_file: "logs/false_predictions.json"
  enable_post_training_mining: true
  mined_subdirectory: "mined"
  min_epochs_before_mining: 10
  top_k_per_epoch: 150
  deduplicate_by_hash: true
  # Top FP extraction with stricter settings for max quality
  extract_top_fps: true
  top_fp_percent: 5.0
  extraction_confidence_threshold: 0.8   # Stricter than standard (0.5)
  extraction_output_dir: "${DATASET_DIR:-./dataset}/top5fps"
  extraction_log_file: "logs/top_fp_extraction.json"
  run_extraction_at_training_end: true
  extraction_batch_size: 128             # Larger batch for max quality

# ─────────────────────────────────────────────────────────────────
# EXPORT SETTINGS
# ─────────────────────────────────────────────────────────────────
export:
  wake_word: "Hey Katya"
  author: "Sarpel GURAY"
  website: "https://github.com/sarpel/microwakeword-training-platform"
  trained_languages: ["en"]

  quantize: true
  inference_input_type: "int8"
  inference_output_type: "uint8"

  probability_cutoff: 0.97
  sliding_window_size: 5
  tensor_arena_size: 0  # auto-calculate from exported model
  minimum_esphome_version: "2024.7.0"

  # Larger calibration dataset for max quality quantization
  representative_dataset_size: 1000
  representative_dataset_real_size: 4000
  arena_size_margin: 1.3

# ─────────────────────────────────────────────────────────────────
# PREPROCESSING (strict filtering for max quality)
# ─────────────────────────────────────────────────────────────────
preprocessing:
  min_duration_ms: 300.0
  max_duration_ms: 2000.0
  discarded_dir: "./discarded"
  vad_aggressiveness: 2
  vad_pad_ms: 200
  vad_frame_ms: 30
  split_max_chunk_ms: 2000.0
  split_min_chunk_ms: 500.0
  split_target_chunk_ms: 2000.0

# ─────────────────────────────────────────────────────────────────
# QUALITY SCORING THRESHOLDS (strict for max quality)
# ─────────────────────────────────────────────────────────────────
quality:
  clip_threshold: 0.001
  max_clip_ratio: 0.01
  discard_bottom_pct: 5.0
  min_wqi: 0.0
  discarded_quality_dir: "./discarded/quality"
  min_snr_db: -10.0
  vad_speech_threshold: 0.3
  dnsmos_min_ovrl: 0.0
  dnsmos_min_sig: 0.0
  dnsmos_cache_dir: "~/.cache/dnsmos"

# ─────────────────────────────────────────────────────────────────
# EVALUATION AND METRICS
# ─────────────────────────────────────────────────────────────────
evaluation:
  default_threshold: 0.97       # Match deployment probability_cutoff (legacy name)
  detection_threshold: 0.97     # Canonical threshold name (alias)
  n_thresholds: 501
  max_fah: 10.0
  warmup_runs: 10
  n_latency_runs: 100
  target_fah: 5.0               # Relaxed from 0.2 — 0.2 on 4.2h val = ~0 FP tolerance, too strict
  target_recall: 0.90
  gain_window_steps: 1000
  plateau_window_evals: 5
  plateau_min_delta: 0.001

# ─────────────────────────────────────────────────────────────────
# AUTO-TUNING (post-training fine-tuning, aggressive for max quality)
# ─────────────────────────────────────────────────────────────────
auto_tuning:
  enabled: true
  target_fah: 5.0               # Relaxed from 0.2 — match evaluation target_fah
  target_recall: 0.90
  max_iterations: 50            # Quality over speed
  max_gradient_steps: 2500    # Generous budget for max quality
  patience: 15
  cv_folds: 3
  confirmation_fraction: 0.40
  bootstrap_samples: 2000       # More samples for max quality
  require_confirmation: true
  group_key: speaker_id
  pareto_improvement_threshold: 0.003
  convergence_window: 7
  output_dir: ./tuning_output

# Expert-level auto-tuning parameters (max quality settings)
auto_tuning_expert:
  min_burst_steps: 200
  max_burst_steps: 25000         # Allow longer bursts for max quality
  default_burst_steps: 750
  min_lr: 0.0000001
  max_lr: 0.0001
  default_lr: 0.00001
  sam_rho: 0.05
  swa_collection_interval: 100
  initial_temperature: 0.5
  cooling_rate: 0.97            # Slower cooling for more exploration
  reheat_after: 5
  reheat_factor: 1.3
  active_pool_size: 16          # Larger pool for max quality
  pareto_archive_size: 32       # Larger archive for max quality
  stir_level_1: 3
  stir_level_2: 5
  stir_level_3: 7
  stir_level_4: 9
  stir_level_5: 12
  curriculum_advance_threshold: 0.3
