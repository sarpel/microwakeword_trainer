DATASET_DIR: "./dataset"
DATA_DIR: "./data"
CHECKPOINT_DIR: "./models/checkpoints"
MODEL_EXPORT_DIR: "./models/exported"

training:
  batch_size: 128

  # Less frequent evaluation (faster iterations)
  eval_advanced_step_interval: 5000
  eval_basic_step_interval: 1000
  eval_checkpoints_interval: 5000

  # Different class weighting strategy (recall-biased)
  hard_negative_class_weight: [1.0, 1.0, 1.0]

  # Checkpoint selection: optimize for recall
  label_smoothing: 0.0

  learning_rates: [0.001, 0.0002, 0.00005]
  minimization_metric: "average_viable_recall"
  negative_class_weight: [1.0, 1.0, 1.0]
  positive_class_weight: [10.0, 20.0, 30.0]
  target_minimization: 1.0

  # No label smoothing
  training_steps: [20000, 10000, 5000]

model:
  residual_connection: "0,1,1,1"  # Repository default: residuals enabled on blocks 2-4

augmentation:
  AddBackgroundNoiseFromFile: 0.35

  # Wider pitch shift range
  pitch_shift_max_semitones: 2.0

  pitch_shift_min_semitones: -2.0
  PitchShift: 0.15
  TanhDistortion: 0.15

performance:
  prefetch_factor: 8

  # TensorBoard configuration (Phase 4 sophisticated metrics)
  tensorboard_enabled: true
  tensorboard_histogram_interval: 5000
  tensorboard_image_interval: 5000
  tensorboard_log_activation_stats: false
  tensorboard_log_advanced_scalars: true
  tensorboard_log_confidence_drift: true
  tensorboard_log_gradient_norms: false
  tensorboard_log_graph: true
  tensorboard_log_histograms: false
  tensorboard_log_images: false
  tensorboard_log_learning_rate: true
  tensorboard_log_per_class_accuracy: true
  tensorboard_log_pr_curves: true
  tensorboard_log_weight_histograms: false
  tensorboard_sophisticated_interval: 2000

evaluation:
  default_threshold: 0.97       # Match deployment probability_cutoff

export:
  max_samples_for_cutoff_calc: 5000

auto_tuning:
  search_eval_fraction: 0.30
