## Lessons Learned

### Configuration Management
- Dataclass validation catches configuration errors early
- Environment variable substitution enables flexible deployment
- Preset inheritance reduces configuration complexity
- Validation rules prevent silent failures

### Performance Optimization
- CuPy provides dramatic speedup for SpecAugment
- Mixed precision is worth the small accuracy trade-off
- Prefetching and parallel loading improve throughput
- Profiling reveals unexpected bottlenecks

### Testing and Quality
- Unit tests provide fast feedback on changes
- Integration tests validate end-to-end workflows
- Quality filtering improves model performance
- Comprehensive metrics guide model selection

### Documentation
- Immutable constants documentation prevents errors
- Per-module AGENTS.md guides AI agents
- User examples reduce onboarding time
- Troubleshooting guide reduces support burden

