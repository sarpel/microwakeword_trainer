## Best Practices Discovered

### Architecture
1. **Immutable Constants**: ARCHITECTURAL_CONSTITUTION.md is source of truth
2. **State Variable Math**: Ring buffer law is inviolable
3. **BatchNorm Folding**: Critical for streaming export
4. **Op Registration**: Only ESPHome-registered ops allowed

### Training
1. **Two-Phase Training**: Better feature learning + precision tuning
2. **Class Weighting**: Essential for imbalanced datasets
3. **Hard Negative Mining**: Significantly improves FAH
4. **Mixed Precision**: 2-3x speedup with minimal accuracy loss
5. **Profiling**: Identify bottlenecks early

### Data Processing
1. **GPU SpecAugment**: 5-10x faster than CPU
2. **Memory Mapping**: Essential for large datasets
3. **Quality Filtering**: Improves model performance
4. **Oversampling**: Prevents majority class bias

### Export
1. **ExportArchive Required**: For streaming state variables
2. **uint8 Output**: Critical for ESPHome compatibility
3. **Variable Quantization**: Required for state variables
4. **Representative Dataset**: Must include boundary values

