- Manual testing on ESPHome devices
- Tensor shape verification
- State variable shape validation
- Flatbuffer analysis verification

**Lessons Learned:**
- BatchNorm folding is critical for streaming export
- State variable shapes must match ring buffer law
- Use ExportArchive, not model.export()

