**Key Features:**
- MixConvBlock with parallel depthwise convolutions
- ResidualBlock with optional residual connections
- MixedNet with configurable filters/kernels/stride
- StreamingMixedNet with 6 state variables
- RingBuffer, Stream, StridedDrop/Keep layers
- Dual-subgraph export support

**Architecture Variants:**
- okay_nabu: 32/64 filters, [[5],[7,11],[9,15],[23]] kernels
- Custom configurations via ModelConfig

**Compliance:**
